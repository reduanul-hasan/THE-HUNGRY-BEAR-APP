// ══════════ REFERRAL SYSTEM ══════════
// নিয়ম: বন্ধু প্রথম purchase complete হলে — দুজনেই ৳50 পাবে
var REFERRAL_DISCOUNT = 50;
var REFERRER_REWARD = 50;

function generateReferralCode(email) {
  var base = email.split("@")[0].toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,5);
  return "BEAR-" + base + Math.floor(Math.random()*900+100);
}

function getUserReferralCode() {
  if (!user) return null;
  var users = JSON.parse(localStorage.getItem("hb_users") || "[]");
  var u = users.find(function(x){ return x.email === user.email; });
  if (u && u.referralCode) return u.referralCode;
  var code = generateReferralCode(user.email);
  users = users.map(function(x){
    return x.email===user.email
      ? Object.assign({},x,{referralCode:code, referralCount:0, referralBalance:0})
      : x;
  });
  localStorage.setItem("hb_users", JSON.stringify(users));
  return code;
}

// pending referral — order place এর সময় store করা হয়
function storePendingReferral(referrerCode, newUserEmail) {
  var pending = JSON.parse(localStorage.getItem("hb_ref_pending") || "[]");
  // একজনের জন্য একটাই pending
  if (pending.find(function(p){ return p.newUser === newUserEmail; })) return;
  pending.push({ referrerCode: referrerCode, newUser: newUserEmail, used: false });
  localStorage.setItem("hb_ref_pending", JSON.stringify(pending));
}

// owner "complete" করলে এই function call হবে
function activateReferralReward(orderUserEmail) {
  var pending = JSON.parse(localStorage.getItem("hb_ref_pending") || "[]");
  var match = pending.find(function(p){ return p.newUser === orderUserEmail && !p.used; });
  if (!match) return;

  var users = JSON.parse(localStorage.getItem("hb_users") || "[]");

  // নতুন বন্ধুর balance যোগ
  users = users.map(function(u){
    if (u.email === orderUserEmail) {
      return Object.assign({},u,{ referralBalance: (u.referralBalance||0) + REFERRAL_DISCOUNT });
    }
    // referrer খুঁজে balance যোগ
    if (u.referralCode === match.referrerCode) {
      return Object.assign({},u,{
        referralBalance: (u.referralBalance||0) + REFERRER_REWARD,
        referralCount: (u.referralCount||0) + 1
      });
    }
    return u;
  });

  // pending mark as used
  pending = pending.map(function(p){
    return p.newUser === orderUserEmail ? Object.assign({},p,{used:true}) : p;
  });

  localStorage.setItem("hb_users", JSON.stringify(users));
  localStorage.setItem("hb_ref_pending", JSON.stringify(pending));

function playBeep() {
  try {
    var c = new(window.AudioContext || window.webkitAudioContext)();
    [0,160,320].forEach(function(t,i) {
      var o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = "sine"; o.frequency.value = i===2 ? 900 : 660;
      g.gain.setValueAtTime(0.35, c.currentTime+t/1000);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+t/1000+0.22);
      o.start(c.currentTime+t/1000); o.stop(c.currentTime+t/1000+0.22);
    });
  } catch(e) {}
}

function toast(title, msg, icon, dur) {
  icon = icon || "🔔"; dur = dur || 5000;
  document.getElementById("notif-title").textContent = title;
  document.getElementById("notif-msg").textContent = msg;
  document.getElementById("notif-icon").textContent = icon;
  var t = document.getElementById("notif-toast");
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.classList.remove("show"); }, dur);
}

function startSlider() {
  setTimeout(function() {
    var w = document.getElementById("slider-wrap");
    if (!w) return;
    var cur = 0, total = 4;
    setInterval(function() {
      cur = (cur+1) % total;
      w.scrollTo({left: cur*222, behavior:"smooth"});
      for (var i=0; i<total; i++) {
        var d = document.getElementById("dot-"+i);
        if (d) { d.style.width = i===cur?"16px":"5px"; d.style.background = i===cur?"#C8860A":"#C8860A44"; }
      }
    }, 3000);
  }, 200);
}

function acctLogin() {
  var email = document.getElementById("al-email").value.trim();
  var pass = document.getElementById("al-pass").value;
  var err = document.getElementById("al-err");
  if (!email || !pass) { err.textContent = "Email ও Password দিন।"; return; }
  err.textContent = "⏳ যাচাই করা হচ্ছে...";
  // First check localStorage (passwords are stored here, not in Firestore)
  var users = JSON.parse(localStorage.getItem("hb_users") || "[]");
  var u = users.find(function(x){ return x.email===email && x.pass===pass; });
  if (u) {
    user = u; localStorage.setItem("hb_user", JSON.stringify(u));
    loadOrdersFromFirestore(function(){ updateHeader(); showPage("account"); });
    toast("Login সফল!", "স্বাগতম, "+u.name+"!", "🐻", 3000);
    return;
  }
  // If not found locally, try Firestore (for users registered on other devices)
  loadUserFromFirestore(email, function(fsUser) {
    if (fsUser && fsUser.pass === pass) {
      u = Object.assign({}, fsUser, {pass: pass});
      var idx = users.findIndex(function(x){return x.email===email;});
      if (idx>=0) users[idx]=u; else users.push(u);
      localStorage.setItem("hb_users", JSON.stringify(users));
      user = u; localStorage.setItem("hb_user", JSON.stringify(u));
      loadOrdersFromFirestore(function(){ updateHeader(); showPage("account"); });
      toast("Login সফল!", "স্বাগতম, "+u.name+"!", "🐻", 3000);
    } else {
      err.textContent = "Email বা Password ভুল।";
    }
  });
}

}

function addToCart(id) {
  var allItems = [];
  Object.values(MENU).forEach(function(c){ allItems = allItems.concat(c.items); });
  var item = allItems.find(function(i){ return i.id===id; });
  if (!item) return;
  var qty = getSrv(id), price = getPrice(item, qty), key = id+"-"+qty;
  var idx = cart.findIndex(function(c){ return c.key===key; });
  if (idx >= 0) cart[idx].count++;
  else cart.push({key:key, id:id, name:item.name, bn:item.bn, qty:qty, price:price, count:1});
  updateHeader();
  var btn = document.getElementById("add-"+id);
  if (btn) { var o = btn.innerHTML; btn.innerHTML = "Added ✓"; btn.style.background = "#22C55ECC"; setTimeout(function(){ btn.innerHTML=o; btn.style.background=""; }, 900); }
}

function removeFromCart(key) { cart = cart.filter(function(c){ return c.key!==key; }); renderOverlay("cart"); }
function changeCount(key, d) {
  var idx = cart.findIndex(function(c){ return c.key===key; });
  if (idx < 0) return;
  cart[idx].count = Math.max(1, cart[idx].count + d);
  renderOverlay("cart");
}

function applyCoupon() {
  var code = document.getElementById("ci").value.trim().toUpperCase();
  var err = document.getElementById("cerr");
  if (!code) { err.textContent = "Code দিন।"; return; }
  if (!COUPONS[code]) { err.textContent = "Invalid coupon।"; appliedCoupon=null; renderOverlay("cart"); return; }
  appliedCoupon = code; err.textContent = ""; renderOverlay("cart");
  toast("Coupon Applied!", COUPONS[code].desc, "🏷️", 3000);
}
function removeCoupon() { appliedCoupon = null; renderOverlay("cart"); }

function onAreaChange(val) {
  selectedArea = val;
  var dEl = document.getElementById("delivery-charge-info");
  var totalEl = document.getElementById("live-total");
  var dc = getDeliveryCharge(val);
  if (dEl) dEl.innerHTML = dc === 0 ? "✅ ফ্রি ডেলিভারি!" : "🚴 ডেলিভারি চার্জ: <b>BDT " + dc + "</b>";
  if (totalEl) totalEl.textContent = "BDT " + (cartFoodTotal() + dc);
  var custom = document.getElementById("ofa_custom");
  if (custom) custom.style.display = val === "other" ? "block" : "none";
}
function onPaymentModeChange(mode) {
  paymentMode = mode;
  var bkashSection = document.getElementById("bkash-section");
  var codSection = document.getElementById("cod-section");
  if (bkashSection) bkashSection.style.display = mode === "bkash" ? "block" : "none";
  if (codSection) codSection.style.display = mode === "cod" ? "block" : "none";
}

function placeOrder() {

  if (areaSelect === "other" && (!areaCustomEl || !areaCustomEl.value.trim())) { toast("এলাকা লিখুন","আপনার এলাকার নাম লিখুন।","📍",3000); return; }
  var txn = "";
  if (paymentMode === "bkash") {
    var txnEl = document.getElementById("oft");
    txn = txnEl ? txnEl.value.trim() : "";
    if (!txn) { toast("TXN দিন","bKash Transaction ID দিন।","⚠️",3000); return; }
  } else {
    txn = "COD";
  }
  var dc = getDeliveryCharge(area);
  var balDeduct = (useBalance && user) ? Math.min(getReferralBalance(), cartFoodTotal()+dc) : 0;
  var finalTotal = Math.max(0, cartFoodTotal() + dc - balDeduct);
  var btn = document.getElementById("pbtn"); btn.disabled=true; btn.innerHTML="⏳ Placing...";
  var order = {
    id:uid(), userEmail:user?user.email:"guest@order.com", userName:name,
    phone:phone, area:area, txnId:txn, screenshot:screenshotData,
    items:cart.slice(), total:finalTotal, coupon:appliedCoupon,
    referral:appliedReferral, deliveryCharge:dc, paymentMode:paymentMode,
    balanceUsed:balDeduct,
    status:"pending", date:new Date().toLocaleString("en-BD")
  };
  if (balDeduct > 0) useReferralBalance(balDeduct);
  var all = getOrders(); saveOrders([order].concat(all));
  saveOrderToFirestore(order);
  lastOrderCount = all.length+1; appliedCoupon = null; appliedReferral = null; selectedArea = ""; useBalance = false;
  placedOrder = order; cart = []; screenshotData = null; cartStep = 1; paymentMode = "bkash";
  updateHeader(); renderOverlay("cart");
  sendOrderEmail(order).then(function(ok) {

  });
}

      if (p1el) { var v=parseInt(p1el.value); if(!isNaN(v)&&v>0) item.p1=v; }
      if (p3el) { var v2=parseInt(p3el.value); item.p3 = (p3el.value.trim()&&!isNaN(v2)&&v2>0)?v2:null; }
    });
  });
  sdSaveMenu();
  showPage("secretdoor");
}

function renderSecretDoor() {
  if (!isSecretDoor) return '<div style="padding:40px 20px;text-align:center;"><div style="font-size:40px;">🔒</div><div style="color:#EF4444;margin-top:10px;">Access Denied</div></div>';

  var all = getOrders();
  var revenue = all.filter(function(o){ return o.status==="complete"; }).reduce(function(a,o){ return a+o.total; },0);
  var pending = all.filter(function(o){ return o.status==="pending"; }).length;

  // Best selling item
  var itemSales = {};
  all.forEach(function(o){ o.items.forEach(function(i){ itemSales[i.name]=(itemSales[i.name]||0)+i.count; }); });
  var bestItem = Object.keys(itemSales).sort(function(a,b){ return itemSales[b]-itemSales[a]; })[0] || "N/A";
  var bestCount = itemSales[bestItem] || 0;

  // Lowest price item
  var allItems = [];
  Object.entries(MENU).forEach(function(kv){ kv[1].items.forEach(function(i){ allItems.push({name:i.name, price:i.p1}); }); });
  allItems.sort(function(a,b){ return a.price-b.price; });
  var lowestItem = allItems[0] || {name:"N/A", price:0};

  var tab = sdMenuEdit || Object.keys(MENU)[0];

  // Stats bar
  var statsHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;">' +
    '<div class="stat-card"><div style="font-size:18px;">📦</div><div style="font-size:9px;color:#F5ECD799;margin-top:4px;">TOTAL ORDERS</div><div style="font-size:20px;font-weight:700;color:#C8860A;">' + all.length + '</div></div>' +
    '<div class="stat-card"><div style="font-size:18px;">💰</div><div style="font-size:9px;color:#F5ECD799;margin-top:4px;">REVENUE</div><div style="font-size:18px;font-weight:700;color:#22C55E;">BDT ' + revenue + '</div></div>' +
    '<div class="stat-card"><div style="font-size:18px;">⏳</div><div style="font-size:9px;color:#F5ECD799;margin-top:4px;">PENDING</div><div style="font-size:20px;font-weight:700;color:#F59E0B;">' + pending + '</div></div>' +
    '<div class="stat-card"><div style="font-size:18px;">🏆</div><div style="font-size:9px;color:#F5ECD799;margin-top:4px;">BEST SELLER</div><div style="font-size:11px;font-weight:700;color:#C8860A;margin-top:2px;">' + esc(bestItem) + '</div><div style="font-size:10px;color:#F5ECD799;">' + bestCount + ' sold</div></div>' +
    '</div>' +
    '<div style="background:#C8860A11;border:1px solid #C8860A33;border-radius:12px;padding:12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;">' +
    '<div><div style="font-size:9px;color:#F5ECD799;letter-spacing:2px;">LOWEST PRICE ITEM</div><div style="font-size:13px;font-weight:700;color:#F5ECD7;margin-top:3px;">' + esc(lowestItem.name) + '</div></div>' +
    '<div style="font-size:20px;font-weight:700;color:#C8860A;">BDT ' + lowestItem.price + '</div>' +
    '</div>';

  // Sales celebration
  var celebHTML = "";
  if (all.filter(function(o){return o.status==="complete";}).length >= 1) {
    var completedCount = all.filter(function(o){return o.status==="complete";}).length;
    celebHTML = '<div style="background:linear-gradient(135deg,#C8860A22,#22C55E22);border:2px solid #C8860A44;border-radius:14px;padding:14px;margin-bottom:18px;text-align:center;">' +
      '<div style="font-size:28px;margin-bottom:6px;">🎉</div>' +
      '<div style="font-size:13px;font-weight:700;color:#C8860A;">উদযাপন!</div>' +
      '<div style="font-size:12px;color:#F5ECD7CC;margin-top:4px;">' + completedCount + 'টি অর্ডার সফলভাবে ডেলিভারি হয়েছে!</div>' +
      '<div style="font-size:11px;color:#22C55E;margin-top:4px;">Total Revenue: BDT ' + revenue + ' 🐻</div>' +
      '</div>';
  }

  // Category tabs for menu editor
  var catTabsHTML = '<div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;">' +
    Object.entries(MENU).map(function(kv) {
      var key = kv[0], cat = kv[1];
      var active = key === tab;
      return '<button onclick="sdMenuEdit=\'' + key + '\';showPage(\'secretdoor\')" class="pill" style="background:' + (active?cat.color:"transparent") + ';border-color:' + (active?cat.color:cat.color+"55") + ';color:' + (active?"#0D0A07":cat.color) + ';">' + cat.emoji + ' ' + cat.title + '</button>';
    }).join("") + '</div>';

  // Items editor for selected category
  var selCat = MENU[tab];
  var itemsEditorHTML = selCat.items.map(function(item) {
    return '<div style="background:#130E08;border:1px solid #C8860A33;border-radius:12px;padding:13px;margin-bottom:10px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">' +
      '<div style="flex:1;"><div style="font-size:12px;font-weight:700;color:#F5ECD7;">' + esc(item.name) + '</div><div style="font-size:10px;color:#C8860A;">' + esc(item.bn) + '</div></div>' +
      '<button onclick="sdDeleteItem(\'' + tab + '\',' + item.id + ')" style="background:#EF444422;border:1px solid #EF444444;border-radius:6px;padding:4px 9px;color:#EF4444;font-size:10px;cursor:pointer;">🗑️ Delete</button>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
      '<div><div style="font-size:9px;color:#F5ECD799;margin-bottom:4px;letter-spacing:2px;">PRICE (1 জন)</div>' +
      '<input id="sdp1-' + item.id + '" class="inp" type="number" value="' + item.p1 + '" style="margin-bottom:0;"/></div>' +
      '<div><div style="font-size:9px;color:#F5ECD799;margin-bottom:4px;letter-spacing:2px;">PRICE (3 জন)</div>' +
      '<input id="sdp3-' + item.id + '" class="inp" type="number" value="' + (item.p3||"") + '" placeholder="N/A" style="margin-bottom:0;"/></div>' +
      '</div>' +
      (function(){
        var so = JSON.parse(localStorage.getItem("hb_soldout")||"[]");
        var isSO = so.indexOf(item.id) >= 0;
        return '<div style="margin-top:10px;">' +
          '<button onclick="toggleSoldOut(' + item.id + ')" style="width:100%;background:' + (isSO?"#EF444433":"#22C55E22") + ';border:2px solid ' + (isSO?"#EF4444":"#22C55E") + ';border-radius:8px;padding:9px;color:' + (isSO?"#EF4444":"#22C55E") + ';font-size:12px;font-weight:700;cursor:pointer;">' +
          (isSO ? "❌ SOLD OUT — ক্লিক করুন Available করতে" : "✅ AVAILABLE — ক্লিক করুন Sold Out করতে") +
          '</button></div>';
      })() +
      '</div>';
  }).join("");

  // Add new item form
  var addFormHTML = '<div style="background:#1A110A;border:2px dashed #C8860A44;border-radius:14px;padding:16px;margin-top:12px;">' +
    '<div style="font-size:10px;color:#C8860A;font-weight:700;letter-spacing:3px;margin-bottom:12px;">➕ NEW ITEM ADD করুন</div>' +
    '<input class="inp" id="sd-new-name" placeholder="Item Name (English) *"/>' +
    '<input class="inp" id="sd-new-bn" placeholder="বাংলা নাম"/>' +
    '<input class="inp" id="sd-new-desc" placeholder="Description"/>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
    '<input class="inp" id="sd-new-p1" type="number" placeholder="Price 1 জন *" style="margin-bottom:0;"/>' +
    '<input class="inp" id="sd-new-p3" type="number" placeholder="Price 3 জন (optional)" style="margin-bottom:0;"/>' +
    '</div>' +
    '<div id="sd-new-err" style="color:#EF4444;font-size:11px;min-height:14px;margin-top:5px;"></div>' +
    '<button onclick="sdAddItem(\'' + tab + '\')" class="btn-gold" style="margin-top:8px;">➕ Add Item</button>' +
    '</div>';

  // ── Order management section ──
  var sdFiltered = sdOrderFilter === "all" ? all : all.filter(function(o){ return o.status === sdOrderFilter; });
  var sdFilterHTML = '<div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;">' +
    [["all","ALL","#C8860A"],["pending","⏳ Pending","#F59E0B"],["confirmed","🔵 Confirmed","#3B82F6"],["complete","✅ Done","#22C55E"],["cancelled","❌ Cancelled","#EF4444"]].map(function(f){
      var active = sdOrderFilter === f[0];
      var cnt = f[0]==="all" ? all.length : all.filter(function(o){return o.status===f[0];}).length;
      return '<button class="pill" onclick="sdSetFilter(\'' + f[0] + '\')" style="background:' + (active?f[2]:"transparent") + ';border-color:' + f[2] + (active?"":"55") + ';color:' + (active?"#0D0A07":f[2]) + ';font-size:10px;">' + f[1] + (cnt>0?' ('+cnt+')':'') + '</button>';
    }).join("") + '</div>';

  var sdOrdersHTML = sdFiltered.length === 0 ?
    '<div style="text-align:center;padding:28px 0;color:#F5ECD799;font-size:12px;">কোনো অর্ডার নেই</div>' :
    sdFiltered.map(function(o) {
      var isDone = o.status === "complete";
      var isConf = o.status === "confirmed";
      var cardBorder = isDone ? "border:2px solid #22C55E88;" : isConf ? "border:2px solid #3B82F688;" : o.status==="pending" ? "border:2px solid #F59E0B66;" : "border:1px solid #C8860A33;";
      var cardGlow = isDone ? "box-shadow:0 0 16px #22C55E22;" : "";
      return '<div style="' + cardBorder + cardGlow + 'border-radius:14px;padding:14px;margin-bottom:10px;background:#130E08;position:relative;">' +
        // Green tick overlay for completed
        (isDone ? '<div style="position:absolute;top:12px;right:12px;width:36px;height:36px;background:#22C55E;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 12px #22C55E66;">✅</div>' : '') +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;padding-right:' + (isDone?"44px":"0") + ';">' +
        '<div><span style="font-size:13px;color:#C8860A;font-weight:700;">#' + o.id + '</span><span style="font-size:10px;color:#F5ECD799;margin-left:8px;">' + o.date + '</span></div>' +
        '<span class="status-badge" style="background:' + (SC[o.status]||"#888") + '22;border:1px solid ' + (SC[o.status]||"#888") + '44;color:' + (SC[o.status]||"#888") + ';display:' + (isDone?"none":"inline-flex") + ';">' + o.status + '</span>' +
        '</div>' +
        '<div style="font-size:13px;font-weight:700;color:#F5ECD7;margin-bottom:2px;">' + esc(o.userName) + '</div>' +
        '<div style="font-size:11px;color:#F5ECD799;margin-bottom:2px;">📞 ' + esc(o.phone) + ' · 📍 ' + esc(o.area) + '</div>' +
        '<div style="font-size:11px;color:#F59E0B;margin-bottom:7px;">💳 TXN: ' + esc(o.txnId) + '</div>' +
        o.items.map(function(i){ return '<div style="font-size:11px;color:#F5ECD7CC;margin-bottom:2px;">• ' + esc(i.name) + ' x' + i.count + ' = BDT ' + (i.price*i.count) + '</div>'; }).join("") +
        '<div style="font-size:15px;font-weight:700;color:' + (isDone?"#22C55E":"#C8860A") + ';margin:9px 0 10px;">Total: BDT ' + o.total + '</div>' +
        // Action buttons
        (isDone ?
          '<div style="background:#22C55E22;border:2px solid #22C55E66;border-radius:10px;padding:10px;text-align:center;">' +
          '<div style="font-size:24px;margin-bottom:3px;">✅</div>' +
          '<div style="font-size:12px;font-weight:700;color:#22C55E;">ডেলিভারি সম্পন্ন হয়েছে!</div>' +
          '<button onclick="sdUpdateStatus(\'' + o.id + '\',\'pending\')" style="margin-top:8px;background:transparent;border:1px solid #F59E0B44;border-radius:6px;padding:5px 12px;color:#F59E0B;font-size:10px;cursor:pointer;">↩ Undo</button>' +
          '</div>'
        :
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">' +
          (o.status!=="confirmed" ? '<button onclick="sdUpdateStatus(\'' + o.id + '\',\'confirmed\')" style="background:#3B82F622;border:2px solid #3B82F655;border-radius:10px;padding:11px 8px;color:#3B82F6;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">🔵 Confirm</button>' : '<div style="background:#3B82F633;border:2px solid #3B82F6;border-radius:10px;padding:11px 8px;color:#3B82F6;font-size:11px;font-weight:700;text-align:center;">✓ Confirmed</div>') +
          '<button onclick="sdUpdateStatus(\'' + o.id + '\',\'complete\')" style="background:#22C55E22;border:2px solid #22C55E88;border-radius:10px;padding:11px 8px;color:#22C55E;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">✅ Complete</button>' +
          '</div>' +
          '<button onclick="sdUpdateStatus(\'' + o.id + '\',\'cancelled\')" style="width:100%;background:transparent;border:1px solid #EF444433;border-radius:8px;padding:7px;color:#EF4444;font-size:10px;cursor:pointer;margin-top:6px;">❌ Cancel Order</button>'
        ) +
        '</div>';
    }).join("");

  return '<div style="padding:22px 20px;">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">' +
    '<div>' +
    '<div style="font-size:9px;color:#C8860A;letter-spacing:4px;margin-bottom:2px;">ADMIN PANEL</div>' +
    '<h2 style="font-size:20px;color:#C8860A;letter-spacing:2px;">🚪 Secret Door</h2>' +
    '</div>' +
    '<button onclick="exitSecretDoor()" style="background:#EF444422;border:1px solid #EF444444;border-radius:8px;padding:7px 12px;color:#EF4444;font-size:10px;cursor:pointer;">✕ Exit</button>' +
    '</div>' +
    '<div style="font-size:11px;color:#F5ECD799;margin-bottom:18px;">Full order & menu control</div>' +
    celebHTML +
    statsHTML +

    // ── Orders section ──
    '<div style="border:1px solid #22C55E44;border-radius:14px;padding:16px;margin-bottom:14px;background:#0A180E;">' +
    '<div style="font-size:10px;color:#22C55E;font-weight:700;letter-spacing:3px;margin-bottom:14px;">📋 ORDER MANAGEMENT</div>' +
    sdFilterHTML +
    sdOrdersHTML +
    '</div>' +

    // ── Menu section ──
    '<div style="border:1px solid #C8860A33;border-radius:14px;padding:16px;margin-bottom:12px;">' +
    '<div style="font-size:10px;color:#C8860A;font-weight:700;letter-spacing:3px;margin-bottom:14px;">🍽️ MENU & PRICE MANAGER</div>' +
    catTabsHTML +
    itemsEditorHTML +
    '<button onclick="sdSavePriceChanges()" class="btn-gold" style="margin-top:4px;">💾 Save All Changes</button>' +
    addFormHTML +
    '</div>' +
    // ── Reviews Section ──
    (function(){
      var reviews = getReviews();
      var avg = avgRating();
      if (!reviews.length) return '<div style="border:1px solid #C8860A33;border-radius:14px;padding:16px;margin-bottom:12px;">' +
        '<div style="font-size:10px;color:#C8860A;font-weight:700;letter-spacing:3px;margin-bottom:8px;">⭐ CUSTOMER REVIEWS</div>' +
        '<div style="text-align:center;color:#F5ECD755;font-size:12px;padding:16px 0;">এখনো কোনো রিভিউ নেই</div></div>';
      return '<div style="border:1px solid #C8860A33;border-radius:14px;padding:16px;margin-bottom:12px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
        '<div style="font-size:10px;color:#C8860A;font-weight:700;letter-spacing:3px;">⭐ REVIEWS (' + reviews.length + ')</div>' +
        '<div style="font-size:16px;font-weight:700;color:#F5C842;">⭐ ' + avg + ' / 5</div>' +
        '</div>' +
        reviews.slice(0,5).map(function(r){
          return '<div style="background:#130E08;border-radius:10px;padding:11px;margin-bottom:8px;">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">' +
            '<div style="font-size:12px;font-weight:700;color:#F5ECD7;">' + esc(r.userName) + '</div>' +
            '<div style="font-size:13px;">' + "⭐".repeat(r.rating) + '</div>' +
            '</div>' +
            (r.comment ? '<div style="font-size:11px;color:#F5ECD799;">"' + esc(r.comment) + '"</div>' : "") +
            '<div style="font-size:9px;color:#F5ECD744;margin-top:4px;">' + r.date + ' · Order #' + r.orderId + '</div>' +
            '</div>';
        }).join("") +
        '</div>';
    })() +
    '<button onclick="exitSecretDoor()" style="width:100%;background:#EF444422;border:1px solid #EF444444;border-radius:10px;padding:13px;color:#EF4444;font-size:13px;font-weight:700;cursor:pointer;">🚪 Exit Secret Door</button>' +
    '</div>';
}

sdLoadMenu();
showPage("home");
